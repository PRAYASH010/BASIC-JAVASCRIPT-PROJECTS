<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="clock.css" />
    <title>Digital Clock</title>
  </head>
  <body>
    <div class="main_container">
      <div class="time-box">
        <p>HOUR</p>
        <input type="text" id="hour" disabled />
      </div>

      <div class="time-box">
        <p>MINUTE</p>
        <input type="text" id="minute" disabled />
      </div>

      <div class="time-box">
        <p>SECOND</p>
        <input type="text" id="second" disabled />
      </div>
    </div>
  </body>
  <script src="clock.js"></script>
</html>
