<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
    <title>BMI Calculator</title>
</head>
<body>
    <div class="main-container">
        <h3 class="heading">Body Mass Index (BMI) Calculator</h3>
            <label for="number">Your Height (cm) :</label>
            <input type="number" id="Height" value="180" placeholder="Enter your Height">
            <label for="number">Your Weight (kg) :</label>
            <input type="number" id="Weight" value="80" placeholder="Enter your Weight">
            <button class="btn">Compute BMI</button>
            <label for="text">Your BMI :</label>
            <input type="text" id="output" disabled>
            <h4 class="info-text">Weight Condition : <span></span></h4>
    </div>

    <script src="script.js"></script>
</body>
</html>
